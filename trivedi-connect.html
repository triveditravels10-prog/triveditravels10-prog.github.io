<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivedi Connect</title>

<link rel="stylesheet" href="trivedi-connect.css">

</head>

<body>

<!-- 🔥 HEADER -->
<div class="header">
  <div class="logo">🚀 Trivedi Connect</div>
  <div class="header-icons">
    🔍 📞 ⋮
  </div>
</div>

<div class="container">

  <!-- 🔥 SIDEBAR -->
  <div class="sidebar">

    <div class="profile">
      <div class="avatar">👤</div>
      <div>
        <h4>Your Profile</h4>
        <small>Online</small>
      </div>
    </div>

    <input type="text" placeholder="Search chats..." class="search-box">

    <div class="chat-list">
      👤 User 1 <br>
      <small>Last message...</small>
    </div>

    <div class="chat-list">
      👤 User 2 <br>
      <small>Typing...</small>
    </div>

    <div class="chat-list">
      👤 User 3 <br>
      <small>Seen</small>
    </div>

  </div>

  <!-- 🔥 CHAT BOX -->
  <div class="chat-box">

    <!-- CHAT HEADER -->
    <div class="chat-header">
      <div>
        <h3>User 1</h3>
        <small>Online</small>
      </div>
    </div>

    <!-- MESSAGES -->
    <div class="messages" id="messages">
      <div class="message received">Hello 👋</div>
      <div class="message sent">Hi!</div>
    </div>

    <!-- INPUT -->
    <div class="input-box">
      <button class="icon-btn">➕</button>

      <input type="text" id="msg" placeholder="Message on Trivedi Connect...">

      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

  </div>

</div>

<!-- JS -->

  <script type="module" src="trivedi-connect.js"></script>

</body>
</html>

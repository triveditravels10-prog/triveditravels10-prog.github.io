<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivedi Connect</title>


<link rel="stylesheet" href="trivedi-connect.css">

  

</head>
<body>

  <div class="header">
  <span>Trivedi Connect</span>
  <div>
    🔍 📞 ⋮
  </div>
</div>
 
  
  <div class="container">  
    <div class="sidebar">
    <div class="chat-list">User 1</div>
    <div class="chat-list">User 2</div>
    <div class="chat-list">User 3</div>
  </div>  <div class="chat-box">
    <div class="messages" id="messages"></div><div class="input-box">
  <input type="text" id="msg" placeholder="Type a message...">
  <button onclick="sendMessage()">Send</button>
</div>

  </div></div><script>
function sendMessage() {
  let msg = document.getElementById("msg").value;
  if(msg === "") return;

  let messageDiv = document.createElement("div");
  messageDiv.className = "message sent";
  messageDiv.innerText = msg;

  document.getElementById("messages").appendChild(messageDiv);
  document.getElementById("msg").value = "";
}
</script></body>
</html>

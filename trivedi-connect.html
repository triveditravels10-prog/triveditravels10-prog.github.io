<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivedi Connect</title>

<link rel="stylesheet" href="trivedi-connect.css">

</head>

<body>

<!-- 🔥 HEADER -->
<div class="header">
  <div class="header-icons">
    <span>🔍</span>
    <span>📞</span>
    <span>⋮</span>
  </div>
  <div class="logo">🚀 Trivedi Connect</div>
</div>

<!-- 🔥 TAGLINE -->
<div class="brand-tagline">
  Connect • Chat • Build 🚀
</div>

<div class="container">

  <!-- 🔥 CHAT BOX (LEFT SIDE NOW) -->
  <div class="chat-box">

    <!-- CHAT HEADER -->
    <div class="chat-header">
      <div>
        <h3>User 1</h3>
        <small>Online • Active</small>
      </div>
      <div class="avatar">👤</div>
    </div>

    <!-- MESSAGES -->
    <div class="messages" id="messages">
      <div class="empty-state">Start chatting 🚀</div>
    </div>

    <!-- 🔥 INPUT (LEFTY FLOW) -->
    <div class="input-box">

      <!-- SEND BUTTON (LEFT + FIXED ARROW) -->
      <button class="send-btn" id="sendBtn"> ◀️ </button>

      <input type="text" id="msg" placeholder="Message on Trivedi Connect...">

      <!-- ATTACH -->
      <button class="icon-btn">➕</button>

    </div>

  </div>

  <!-- 🔥 SIDEBAR (RIGHT SIDE NOW) -->
  <div class="sidebar">

    <div class="profile">
      <div>
        <h4>Your Profile</h4>
        <small>Online</small>
      </div>
      <div class="avatar">👤</div>
    </div>

    <input type="text" placeholder="Search chats..." class="search-box">

    <div class="chat-list">
      👤 User 1 <br>
      <small>Last message...</small>
    </div>

    <div class="chat-list">
      👤 User 2 <br>
      <small>Typing...</small>
    </div>

    <div class="chat-list">
      👤 User 3 <br>
      <small>Seen</small>
    </div>

  </div>

</div>

<!-- JS -->
<script type="module" src="trivedi-connect.js"></script>

</body>
</html>
